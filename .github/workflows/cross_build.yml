name: Build native installers

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: OdeRelic-Linux.AppImage
          - os: macos-latest
            artifact_name: OdeRelic-MacOS.dmg
          - os: windows-latest
            artifact_name: OdeRelic-Windows.zip

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        target: 'desktop'

    - name: Prepare build environment
      run: mkdir build

    - name: Configure CMake
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_NUMBER=${{ github.run_number }} -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
        else
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_NUMBER=${{ github.run_number }}
        fi

    - name: Build
      run: cmake --build build --config Release

    - name: Run automated native tests
      working-directory: ./build
      env:
        QT_QPA_PLATFORM: offscreen
      run: ctest --output-on-failure -C Release

    - name: Deploy Qt frameworks (macOS)
      if: runner.os == 'macOS'
      run: |
        ${{ env.Qt6_DIR }}/bin/macdeployqt build/OdeRelic.app \
          -qmldir=src-cpp \
          -always-overwrite

    - name: Deploy Qt frameworks (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & "${{ env.Qt6_DIR }}\bin\windeployqt.exe" `
          build\Release\OdeRelic.exe `
          --qmldir src-cpp `
          --release `
          --no-translations

    - name: Generate installers native payload (macOS)
      if: runner.os == 'macOS'
      working-directory: ./build
      run: cpack -C Release

    - name: Package AppImage native payload (Linux)
      if: runner.os == 'Linux'
      working-directory: ./build
      run: |
        # Ubuntu 22.04+ permanently stripped FUSE2 securely breaking appimagetool generation dependencies automatically!
        # Additionally, the headless runner lacks the raw libxcb-cursor.so.0 graphic libraries required by QXcb rendering!
        sudo apt-get update && sudo apt-get install -y libfuse2 file libxcb-cursor0
        
        # Scaffold raw AppDir structure
        mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/512x512/apps
        cp OdeRelic AppDir/usr/bin/
        cp ../assets/applogo/icon_512x512.png AppDir/usr/share/icons/hicolor/512x512/apps/OdeRelic.png
        
        # Generate inline metadata desktop structural wrapper
        cat <<EOF > AppDir/usr/share/applications/OdeRelic.desktop
        [Desktop Entry]
        Name=OdeRelic
        Exec=OdeRelic
        Icon=OdeRelic
        Type=Application
        Categories=Utility;
        EOF
        
        # Wire QMake physically towards installed Github runner path bindings cleanly!
        export PATH="${{ env.Qt6_DIR }}/bin:$PATH"
        export QMAKE="${{ env.Qt6_DIR }}/bin/qmake"
        export EXTRA_QT_PLUGINS="qml"
        export QML_SOURCES_PATHS="../src-cpp"
        
        # Trigger native AppImage encapsulation utilizing modern modular linuxdeploy engine securely
        wget -c -nv "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        wget -c -nv "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
        chmod +x linuxdeploy*.AppImage

        ./linuxdeploy-x86_64.AppImage --appdir AppDir \
          --executable AppDir/usr/bin/OdeRelic \
          --desktop-file AppDir/usr/share/applications/OdeRelic.desktop \
          --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/OdeRelic.png \
          --plugin qt --output appimage

        # Extract version metadata parsing directly against CMake bounds organically 
        PROJECT_VERSION=$(grep 'project(OdeRelic VERSION' ../CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
        
        # Rename binary natively utilizing exact version matches dynamically organically identical to CPack outputs natively
        mv OdeRelic-*.AppImage "OdeRelic-v${PROJECT_VERSION}-b${{ github.run_number }}-Linux.AppImage"

    - name: Package Windows ZIP payload natively
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $versionLine = Select-String -Path CMakeLists.txt -Pattern 'project\([^V]+VERSION ([0-9]+\.[0-9]+\.[0-9]+)'
        $version = $versionLine.Matches.Groups[1].Value
        $runNumber = "${{ github.run_number }}"
        Compress-Archive -Path build\Release\* -DestinationPath "build\OdeRelic-v$version-b$runNumber-Windows.zip"

    - name: Upload artifact payloads
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          build/OdeRelic-*.AppImage
          build/*.dmg
          build/OdeRelic-*.zip

  release:
    name: Generate Pre-Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download all compiled artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: Create Beta Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Beta Build: ${{ github.run_number }}"
          tag_name: "beta-${{ github.run_number }}"
          draft: true
          prerelease: true
          generate_release_notes: true
          files: release_assets/*
