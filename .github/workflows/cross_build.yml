name: Build native installers

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: OdeRelic-Linux.deb
          - os: macos-latest
            artifact_name: OdeRelic-MacOS.dmg
          - os: windows-latest
            artifact_name: OdeRelic-Windows.zip

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        target: 'desktop'

    - name: Prepare build environment
      run: mkdir build

    - name: Extract short Git SHA safely across OSes
      shell: bash
      run: |
        calculatedSha=$(git rev-parse --short ${{ github.sha }})
        echo "SHORT_SHA=$calculatedSha" >> "$GITHUB_ENV"

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DGIT_COMMIT_HASH=${{ env.SHORT_SHA }}

    - name: Build
      run: cmake --build build --config Release

    - name: Run automated native tests
      working-directory: ./build
      run: ctest --output-on-failure -C Release

    - name: Deploy Qt frameworks (macOS)
      if: runner.os == 'macOS'
      run: |
        ${{ env.Qt6_DIR }}/bin/macdeployqt build/OdeRelic.app \
          -qmldir=src-cpp \
          -always-overwrite

    - name: Deploy Qt frameworks (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & "${{ env.Qt6_DIR }}\bin\windeployqt.exe" `
          build\Release\OdeRelic.exe `
          --qmldir src-cpp `
          --release `
          --no-translations

    - name: Generate installers native payload via CPack
      working-directory: ./build
      run: cpack -C Release

    - name: Upload artifact payloads
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          build/*.deb
          build/*.dmg
          build/*.zip

  release:
    name: Generate Pre-Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Extract short Git SHA safely
        shell: bash
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_ENV"
        
      - name: Download all compiled artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: Create Beta Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Beta Build: ${{ env.SHORT_SHA }}"
          tag_name: "beta-${{ env.SHORT_SHA }}"
          prerelease: true
          generate_release_notes: true
          files: release_assets/*
